<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yoklama Girişi</title>
    <link rel="icon" href="data:," />
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background:
          radial-gradient(circle at top, rgba(23, 103, 255, 0.08), transparent 28%),
          linear-gradient(180deg, #f7f9fb 0%, #f4f6f8 100%);
        color: #162033;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .landing-shell {
        width: min(100%, 720px);
        padding: 28px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.96);
        border: 1px solid rgba(15, 23, 42, 0.08);
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
      }

      .eyebrow {
        margin: 0 0 10px;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #1767ff;
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        font-size: clamp(1.9rem, 4vw, 2.6rem);
        line-height: 1.1;
      }

      .subtle-copy {
        margin-top: 12px;
        color: #667085;
        line-height: 1.6;
      }

      .link-grid {
        display: grid;
        gap: 14px;
        margin-top: 24px;
      }

      .nav-card {
        display: block;
        padding: 18px 20px;
        border-radius: 18px;
        border: 1px solid rgba(15, 23, 42, 0.08);
        background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
        color: #162033;
        text-decoration: none;
        transition:
          transform 0.15s ease,
          border-color 0.15s ease,
          box-shadow 0.15s ease;
      }

      .nav-card:hover,
      .nav-card:focus-visible {
        transform: translateY(-1px);
        border-color: rgba(23, 103, 255, 0.22);
        box-shadow: 0 16px 30px rgba(15, 23, 42, 0.08);
      }

      .nav-card-title {
        font-size: 1.05rem;
        font-weight: 700;
      }

      .nav-card-copy {
        margin-top: 6px;
        color: #667085;
        line-height: 1.5;
      }

      @media (min-width: 640px) {
        .link-grid {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <main class="landing-shell">
      <p class="eyebrow">Yoklama</p>
      <h1>Yoklama uygulaması girişleri</h1>
      <p class="subtle-copy">
        İlgili ekrana geçmek için aşağıdaki bağlantılardan birini seçin.
      </p>

      <section class="link-grid" aria-label="Ana gezinme">
        <a class="nav-card" href="/admin">
          <div class="nav-card-title">Yönetici Paneli</div>
          <div class="nav-card-copy">QR oluşturma ve kayıt ekranını açın.</div>
        </a>

        <a class="nav-card" href="/scan-web">
          <div class="nav-card-title">Yoklama Girişi</div>
          <div class="nav-card-copy">Öğrenci yoklama gönderim ekranına gidin.</div>
        </a>

        <a class="nav-card" href="/public-qr">
          <div class="nav-card-title">QR Görüntüleme</div>
          <div class="nav-card-copy">Aktif QR kodunu görüntüleme ekranını açın.</div>
        </a>
      </section>
    </main>
  </body>
</html>
