<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Yoklama Gönder</title>
    <meta name="theme-color" content="#0f766e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Yoklama" />
    <link rel="manifest" href="/scan-web/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/scan-web/icons/icon-192.png" />
    <link rel="icon" href="/scan-web/icons/icon-192.png" />
    <link rel="stylesheet" href="/scan-web/scan-web.css" />
    <script src="/scan-web/vendor/html5-qrcode.min.js" defer></script>
    <script src="/scan-web/scan-web.js" defer></script>
  </head>
  <body>
    <main class="page-shell">
      <section class="scanner-card">
        <p class="eyebrow">Yoklama</p>
        <h1>Yoklama Gönder</h1>
        <p class="subtle-copy">
          Öğrenci numaranızı girin ve yoklamayı doğrudan gönderin.
        </p>

        <p id="page-note" class="page-note">
          Bağlantı açıldıktan sonra konum izni vererek yoklamanızı gönderebilirsiniz.
        </p>

        <form id="attendance-form" class="attendance-form">
          <label class="field" for="user-id-input">
            <span>Öğrenci No</span>
            <input
              id="user-id-input"
              type="text"
              inputmode="text"
              autocomplete="off"
              autocapitalize="off"
              spellcheck="false"
              placeholder="Öğrenci numarası"
            />
          </label>

          <button id="submit-button" class="primary-button" type="submit">
            Yoklamayı Gönder
          </button>
        </form>

        <p id="gallery-hint" class="helper-copy" hidden>
          QR kodu ekran görüntüsü alıp galeriden seçebilirsiniz.
        </p>

        <button id="gallery-button" class="secondary-button" type="button" hidden>
          Galeriden QR Seç
        </button>

        <input id="gallery-input" type="file" accept="image/*" hidden />
        <div id="gallery-decoder" class="gallery-decoder" aria-hidden="true"></div>

        <section
          id="result-banner"
          class="result-banner result-idle"
          aria-live="polite"
        >
          Yoklama bağlantısı hazırlanıyor.
        </section>
      </section>
    </main>
  </body>
</html>
